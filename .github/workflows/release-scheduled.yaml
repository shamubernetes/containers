# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Scheduled Release

concurrency:
  group: container-release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      appsToBuild:
        description: App(s) to build, comma separated, or 'all' | 'base' | 'apps'
        required: false
        type: string
        default: all
      force:
        description: Force rebuild
        type: boolean
        default: false
        required: true
  schedule:
  - cron: "0 * * * *" # Every hour

jobs:
  simple-checks:
    name: Simple Checks
    uses: shamubernetes/containers/.github/workflows/simple-checks.yaml@745cc8cb6127e9882a3d2c27d796140b48d6ba9a # main

  build-images:
    name: Build Images
    needs: simple-checks
    uses: shamubernetes/containers/.github/workflows/build-images.yaml@745cc8cb6127e9882a3d2c27d796140b48d6ba9a # main
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      appsToBuild: ${{ inputs.appsToBuild }}
      force: ${{ inputs.force == true }}
      pushImages: true
      sendNotifications: true

  render-readme:
    name: Render Readme
    needs: build-images
    uses: ./.github/workflows/render-readmes.yaml
    secrets: inherit
